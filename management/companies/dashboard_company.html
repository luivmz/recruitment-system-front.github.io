<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Empresa | TalentoHub</title>
    <link rel="stylesheet" href="../../shared/css/variables.css">
    <link rel="stylesheet" href="../../shared/css/base.css">
    <link rel="stylesheet" href="dashboard_company.css">
</head>
<body>

<div id="navbar"></div>

<div class="dashboard-container">
    
    <section id="view-empresas" class="dashboard-section">
        <div class="section-header">
            <div>
                <h2>🏢 Mis Empresas</h2>
                <p class="text-muted">Gestiona los perfiles de tus empresas registradas.</p>
            </div>
            <button class="btn btn-primary" onclick="openModal('modalNuevaEmpresa')">+ Registrar Nueva Empresa</button>
        </div>
        <div id="empresasList" class="grid-container">
            </div>
    </section>

    <section id="view-ofertas" class="dashboard-section hidden">
        <div class="section-header">
            <div>
                <button class="btn btn-secondary btn-sm" onclick="showView('view-empresas')">← Volver a Mis Empresas</button>
                <h2 id="ofertasTitle" style="margin-top: 15px;">Ofertas Publicadas</h2>
            </div>
            <button class="btn btn-primary" onclick="openModal('modalNuevaOferta')">+ Publicar Nueva Oferta</button>
        </div>
        <div id="ofertasList" class="grid-container">
            </div>
    </section>

    <section id="view-postulantes" class="dashboard-section hidden">
        <div class="section-header">
            <div>
                <button class="btn btn-secondary btn-sm" onclick="showView('view-ofertas')">← Volver a Ofertas</button>
                <h2 id="postulantesTitle" style="margin-top: 15px;">Candidatos Postulados</h2>
            </div>
        </div>
        <div id="postulantesList" class="list-container">
            </div>
    </section>

</div>

<div id="modalNuevaEmpresa" class="modal hidden">
    <div class="modal-content">
        <span class="close" onclick="closeModal('modalNuevaEmpresa')">&times;</span>
        <h2>Registrar Nueva Empresa</h2>
        <form id="formNuevaEmpresa" class="form-grid">
            <input type="text" id="empRuc" placeholder="RUC" required>
            <input type="text" id="empRazon" placeholder="Razón Social" required>
            <input type="text" id="empNombre" placeholder="Nombre Comercial" required>
            <input type="text" id="empSector" placeholder="Sector (Ej. Tecnología)" required>
            <select id="empTamano" required>
                <option value="">Tamaño de Empresa</option>
                <option value="1-10">1-10 empleados</option>
                <option value="11-50">11-50 empleados</option>
                <option value="51-200">51-200 empleados</option>
                <option value="200+">Más de 200</option>
            </select>
            <input type="text" id="empUbicacion" placeholder="Ubicación (Ej. Lima, Perú)" required>
            <input type="tel" id="empTelefono" placeholder="Teléfono" required>
            <input type="url" id="empWeb" placeholder="Sitio Web">
            <input type="text" id="empContacto" placeholder="Nombre del Contacto" required>
            <input type="text" id="empCargo" placeholder="Cargo del Contacto" required>
            <input type="url" id="empLogo" placeholder="URL del Logo (Opcional)">
            <div class="full-width">
                <textarea id="empDesc" placeholder="Descripción de la empresa" rows="3" required></textarea>
            </div>
            <div class="full-width form-actions">
                <button type="submit" class="btn btn-primary">Registrar Empresa</button>
            </div>
        </form>
    </div>
</div>

<div id="modalNuevaOferta" class="modal hidden">
    <div class="modal-content">
        <span class="close" onclick="closeModal('modalNuevaOferta')">&times;</span>
        <h2>Publicar Oferta Laboral</h2>
        <form id="formNuevaOferta" class="form-grid">
            <input type="text" id="ofTitulo" placeholder="Título del Puesto" required class="full-width">
            <select id="ofCategoria" required>
                <option value="">Selecciona Categoría</option>
                </select>
            <select id="ofModalidad" required>
                <option value="">Modalidad</option>
                <option value="Remoto">Remoto</option>
                <option value="Híbrido">Híbrido</option>
                <option value="Presencial">Presencial</option>
            </select>
            <input type="text" id="ofUbicacion" placeholder="Ubicación (Ej. Lima, Remoto)" required>
            <input type="number" id="ofSueldo" placeholder="Sueldo Ofrecido (S/)" required>
            <div class="full-width">
                <textarea id="ofDesc" placeholder="Descripción completa del puesto..." rows="4" required></textarea>
            </div>
            <div class="full-width form-actions">
                <button type="submit" class="btn btn-primary">Publicar Oferta</button>
            </div>
        </form>
    </div>
</div>

<div id="footer"></div>

<script src="../../shared/js/mockData.js"></script>
<script src="../../shared/js/utils.js"></script>
<script src="dashboard_company.js"></script>

</body>
</html>
