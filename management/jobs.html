<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ofertas Laborales | TalentoHub</title>

    <link rel="stylesheet" href="../shared/css/variables.css">
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="jobs.css">
</head>

<body>

<div id="navbar"></div>

<div class="container">
    <div class="header-section">
        <h1>Explora Ofertas Laborales</h1>
        <p id="resultados-resumen">Cargando resultados...</p>
    </div>

    <div class="filters">
        <input type="text" id="searchInput" placeholder="Buscar cargo o palabra clave...">
        
        <select id="ubicacionFilter">
            <option value="">Ubicación (Todas)</option>
            <option value="Lima">Lima</option>
            <option value="Arequipa">Arequipa</option>
            <option value="Trujillo">Trujillo</option>
            <option value="Huancayo">Huancayo</option>
            <option value="Remoto">Remoto</option>
        </select>

        <select id="categoriaFilter">
            <option value="">Categoría (Todas)</option>
        </select>

        <select id="modalidadFilter">
            <option value="">Modalidad (Todas)</option>
            <option value="Remoto">Remoto</option>
            <option value="Híbrido">Híbrido</option>
            <option value="Presencial">Presencial</option>
        </select>

        <select id="empresaFilter">
            <option value="">Empresa (Todas)</option>
        </select>

        <select id="fechaFilter">
            <option value="recientes">Más recientes primero</option>
            <option value="antiguas">Más antiguas primero</option>
        </select>
    </div>

    <div id="jobsContainer" class="jobs-grid"></div>

</div>

<div id="jobModal" class="modal">
    </div>

<div id="footer"></div>

<script src="../shared/js/mockData.js"></script>
<script src="../shared/js/utils.js"></script>
<script src="jobs.js"></script>

</body>
</html>
