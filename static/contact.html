<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto | TalentoHub</title>
    <link rel="stylesheet" href="../shared/css/variables.css">
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="static.css">
</head>
<body>

<div id="navbar"></div>

<main class="static-page-container">
    <section class="hero-split">
        <div class="hero-text">
            <h1>¿Tienes un <span class="gradient-text">proyecto</span> en mente?</h1>
            <p>Estamos listos para ayudarte a escalar tu equipo técnico o resolver tus dudas sobre la plataforma.</p>
            
            <div class="glass-form">
                <div class="input-group">
                    <label>Nombre</label>
                    <input type="text" placeholder="Ej. Alex Tech">
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="alex@empresa.com">
                </div>
                <div class="input-group">
                    <label>Mensaje</label>
                    <textarea placeholder="Cuéntanos un poco..."></textarea>
                </div>
                <button class="btn-main full-width">Enviar Mensaje</button>
            </div>
        </div>

        <div class="hero-visual">
            <script type="module" src="https://unpkg.com/@splinetool/viewer@1.0.87/build/spline-viewer.js"></script>
            <spline-viewer url="https://prod.spline.design/iWj6R5I6wO676q74/scene.splinecode"></spline-viewer>
        </div>
    </section>
</main>

<div id="footer"></div>
<script src="../shared/js/utils.js"></script>
</body>
</html>
