<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto | TalentoHub</title>
    <link rel="stylesheet" href="../shared/css/variables.css">
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="static.css">
</head>
<body>

<header id="navbar"></header>

<main class="static-page-container">
    <section class="hero-split">
        <div class="hero-text">
            <h1>¿Tienes un <span class="gradient-text">proyecto</span> en mente?</h1>
            <p>Estamos listos para ayudarte a escalar tu equipo técnico o resolver tus dudas sobre la plataforma.</p>
            
            <form class="glass-form" action="#" method="POST" onsubmit="event.preventDefault(); alert('Mensaje enviado con éxito');">
                <div class="input-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" placeholder="Ej. Alex Tech" required>
                </div>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="alex@empresa.com" required>
                </div>
                <div class="input-group">
                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" placeholder="Cuéntanos un poco..." required></textarea>
                </div>
                <button type="submit" class="btn-main full-width">Enviar Mensaje</button>
            </form>
        </div>

        <div class="hero-visual">
            <script type="module" src="https://unpkg.com/@splinetool/viewer@1.0.87/build/spline-viewer.js"></script>
            <spline-viewer url="https://prod.spline.design/iWj6R5I6wO676q74/scene.splinecode"></spline-viewer>
        </div>
    </section>
</main>

<footer id="footer"></footer>

<script src="../shared/js/utils.js"></script>
</body>
</html>
